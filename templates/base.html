<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Medora{% endblock %}</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --brand:#10B981;
      --brand-600:#0EA371;
      --ink:#0f172a;
      --muted:#475569;
      --bg:#f7faf9;
      --card:#ffffff;
      --ring:rgba(16,185,129,.18);
      --shadow:0 10px 30px rgba(16,185,129,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font:16px/1.5 Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial}
    a{color:inherit;text-decoration:none}
    .container{max-width:1180px;margin:0 auto;padding:0 20px}
    .nav{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #eef2f0}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
    .brand{font-weight:700}
    .menu{display:flex;gap:22px;align-items:center}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:10px;padding:10px 16px;font-weight:600}
    .btn-brand{background:var(--brand);color:#fff;box-shadow:var(--shadow)}
    .btn-brand:hover{background:var(--brand-600)}
    .btn-ghost{background:#fff;border:1px solid #e8ecea}
    .btn-ghost:hover{border-color:#dbe3df}

    .hero{padding:38px 0 10px}
    .h1{font-size:36px;line-height:1.2;font-weight:800;margin:0 0 8px}
    .muted{color:var(--muted)}

    .grid{display:grid;gap:20px}
    @media (min-width: 900px){ .grid-3{grid-template-columns:repeat(3,1fr)} .grid-2{grid-template-columns:repeat(2,1fr)} }

    .card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);border:1px solid #eef2f0}
    .card:hover{box-shadow:0 10px 30px rgba(15,23,42,.06)}
    .badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#0f5132;background:#d1fae5;border-radius:999px;padding:6px 10px}
    .title{font-size:22px;font-weight:700;margin:8px 0 8px}
    .desc{color:var(--muted)}
    .cta{margin-top:14px}

        .section-block{
      border-top:1px solid #e5e7eb;
      padding-top:14px;
      margin-top:16px;
    }
    .section-title{
      font-size:11px;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#6b7280;
      margin-bottom:6px;
    }
    .summary-strip{
      margin-top:14px;
      padding:12px 16px;
      border-radius:14px;
      background:#f9fafb;
      display:grid;
      gap:12px;
    }
    @media (min-width: 768px){
      .summary-strip{
        grid-template-columns:repeat(3, minmax(0,1fr));
      }
    }
    .summary-label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#9ca3af;
      margin-bottom:4px;
    }
    .summary-value{
      font-size:14px;
      font-weight:500;
      color:#0f172a;
    }
      .history-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      padding:10px 0;
      border-top:1px solid #e5e7eb;
    }
    .history-row:first-child{
      border-top:none;
    }
    .history-main{
      flex:1 1 auto;
    }
    .history-actions{
      flex:0 0 auto;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
    }

    .btn-danger{
      border-color:#fecaca;
      color:#b91c1c;
    }
    .btn-danger:hover{
      background:#fee2e2;
      border-color:#fca5a5;
    }

    /* === Профиль пользователя ============================ */
.profile-form-grid{
  display:grid;
  grid-template-columns: 220px minmax(0, 420px);
  column-gap: 20px;
  row-gap: 14px;
  align-items:center;
}

@media (max-width: 768px){
  .profile-form-grid{
    grid-template-columns: 1fr;
  }
}

.profile-label{
  font-size:14px;
  font-weight:500;
  color:#0f172a;
}

.profile-field{
  width:100%;
}

.profile-field p{
  margin:4px 0 0;
}

.profile-hint{
  font-size:12px;
  color:#64748b;
}

  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="{% url 'home' %}" class="brand">Medora</a>
      <nav class="menu">
        <a href="{% url 'triage:triage_form' %}" class="btn btn-ghost">Симптом-чекер</a>
        <a href="{% url 'derm:derm_form' %}"   class="btn btn-ghost">Анализ кожи</a>
        <a href="{% url 'history' %}"           class="btn btn-ghost">История</a>
        {% if user.is_authenticated %}
        <a href="{% url 'accounts:profile' %}" class="btn btn-ghost">Профиль</a>
        {% endif %}

        {% if user.is_authenticated %}
  <form action="{% url 'accounts:logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button class="btn btn-primary">Выйти</button>
  </form>
{% else %}
  <a href="{% url 'accounts:login' %}" class="btn btn-outline" style="margin-right:8px;">Войти</a>
  <a href="{% url 'accounts:signup' %}" class="btn btn-primary">Регистрация</a>
{% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
